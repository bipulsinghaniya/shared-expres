services:
  - type: web
    name: split-ledger-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: USD_TO_INR_RATE
        value: "83.50"

  - type: static_site
    name: split-ledger-web
    env: node
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: NODE_ENV
        value: production
