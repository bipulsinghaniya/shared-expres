services:
  - type: web
    name: split-ledger-api
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install --prefix server
    startCommand: npm run start --prefix server
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: USD_TO_INR_RATE
        value: "83.50"

  - type: static_site
    name: split-ledger-web
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install --prefix client && npm run build --prefix client
    publishPath: client/dist
    envVars:
      - key: NODE_ENV
        value: production
